name: CI/CD Pipeline # (ou le nom que tu as mis)

on:
  push:
    branches:
      - main

jobs:
  # ==========================================
  # 1. TON JOB DU TP2 (Tests, SonarQube, etc.)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      # ... tes autres étapes du TP2 ...

  # ==========================================
  # 2. LE NOUVEAU JOB DU TP3 (À AJOUTER ICI)
  # ==========================================
  deploy-k8s:
    needs: [build-and-test] # Important : On attend que le job au-dessus réussisse !
    runs-on: ubuntu-latest
    
    # Permission requise pour publier sur GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Définir le nom de l'image en minuscules
        run: |
          LOWERCASE_URL=$(echo "ghcr.io/${{ github.repository_owner }}/webapp:${{ github.sha }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$LOWERCASE_URL" >> $GITHUB_ENV

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Création du cluster Kubernetes (Kind)
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: kind-cluster

      - name: Injecter la vraie image dans le manifest
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ env.IMAGE_NAME }}|g" k8s/deployment.yaml

      - name: Création du secret d'authentification GHCR dans K8s
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }}

      - name: Déploiement sur Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Vérification du déploiement (Rollout)
        run: |
          kubectl rollout status deployment/webapp --timeout=60s

      - name: Smoke Test (Vérification de la route /health)
        run: |
          kubectl get pods
          kubectl get services
